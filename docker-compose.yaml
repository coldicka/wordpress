services:
  # Wordpress
  wordpress:
    image: wordpress:latest
    restart: always
    depends_on:
      - db
      - phpmyadmin
    ports:
      - "8000:80"
    environment:
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST}
      WORDPRESS_TITLE: ${WORDPRESS_TITLE}
      WORDPRESS_DB_USER_FILE: /run/secrets/db_user
      WORDPRESS_DB_PASSWORD_FILE: /run/secrets/db_password
      WORDPRESS_DB_NAME_FILE: /run/secrets/db_name
      WORDPRESS_ADMIN_USER_FILE: /run/secrets/wp_admin_user
      WORDPRESS_ADMIN_PASSWORD_FILE: /run/secrets/wp_admin_password
      WORDPRESS_ADMIN_EMAIL_FILE: /run/secrets/wp_admin_email
    volumes:
      - ./wp-content:/var/www/html/wp-content # [./:/var/www/html] - Diese hat Apache
    networks:
      - wpsite
    secrets:
      - db_user
      - db_password
      - db_name
      - wp_admin_user
      - wp_admin_password
      - wp_admin_email

  # Database
  db:
    image: mariadb:latest
    container_name: wordpress_DB
    restart: always
    volumes:
      - db_data:/var/lib/mysql # Persist database data
    networks:
      - wpsite
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
      MYSQL_DATABASE_FILE: /run/secrets/db_name
      MYSQL_USER_FILE: /run/secrets/db_user
      MYSQL_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_root_password
      - db_name
      - db_user
      - db_password

  # phpmyadmin
  phpmyadmin:
    depends_on:
      - db
    image: phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST_FILE: /run/secrets/db_user
      PMA_USER_FILE: /run/secrets/db_name
      PMA_PASSWORD_FILE: /run/secrets/db_password
    restart: always
    networks:
      - wpsite
    secrets:
      - db_user
      - db_name
      - db_password
networks:
  wpsite:
volumes:
  wp-content:
  db_data:
secrets:
  db_root_password:
    file: ./secrets/db_root_password.txt
  db_name:
    file: ./secrets/db_name.txt   
  db_user:
    file: ./secrets/db_user.txt
  db_password:
    file: ./secrets/db_password.txt
  wp_admin_user:
    file: ./secrets/wp_admin_user.txt
  wp_admin_password:
    file: ./secrets/wp_admin_password.txt
  wp_admin_email:
    file: ./secrets/wp_admin_email.txt